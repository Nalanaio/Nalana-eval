<svg viewBox="0 0 1200 1240" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L8,5 Z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a1a">
    Nalana Eval V3.0 — System Map
  </text>
  <text x="600" y="68" text-anchor="middle" font-size="14" fill="#666">
    Four layers, top-to-bottom data flow
  </text>

  <!-- ============ M1: INPUTS ============ -->
  <rect x="80" y="100" width="1040" height="170" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="100" y="132" font-size="20" font-weight="700" fill="#0d47a1">M1. INPUTS — Authoring</text>
  <text x="100" y="154" font-size="13" fill="#555">What humans &amp; scripts produce as input to the system</text>

  <g transform="translate(100, 180)">
    <rect width="220" height="70" rx="6" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="110" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#0d47a1">Test Cases</text>
    <text x="110" y="46" text-anchor="middle" font-size="11" fill="#555">fixtures/starter_v3/</text>
    <text x="110" y="60" text-anchor="middle" font-size="11" fill="#555">fixtures/synthetic/</text>
  </g>

  <g transform="translate(340, 180)">
    <rect width="220" height="70" rx="6" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="110" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#0d47a1">System Prompts</text>
    <text x="110" y="46" text-anchor="middle" font-size="11" fill="#555">prompts/eval_default.md</text>
    <text x="110" y="60" text-anchor="middle" font-size="11" fill="#555">prompts/nalana_prod.md</text>
  </g>

  <g transform="translate(580, 180)">
    <rect width="220" height="70" rx="6" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="110" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#0d47a1">Calibration Images</text>
    <text x="110" y="46" text-anchor="middle" font-size="11" fill="#555">calibration/reference_images/</text>
    <text x="110" y="60" text-anchor="middle" font-size="11" fill="#555">(20-30 per style)</text>
  </g>

  <g transform="translate(820, 180)">
    <rect width="220" height="70" rx="6" fill="#ffffff" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="110" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#0d47a1">Honeypots</text>
    <text x="110" y="46" text-anchor="middle" font-size="11" fill="#555">fixtures/honeypots/</text>
    <text x="110" y="60" text-anchor="middle" font-size="11" fill="#888">planned (task #13)</text>
  </g>

  <!-- Arrow M1 → M2 -->
  <line x1="600" y1="270" x2="600" y2="320" stroke="#444" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ============ M2: EXECUTION ============ -->
  <rect x="80" y="330" width="1040" height="200" rx="12" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="100" y="362" font-size="20" font-weight="700" fill="#bf360c">M2. EXECUTION — Run model + Blender</text>
  <text x="100" y="384" font-size="13" fill="#555">Take one case, call LLM, execute in Blender, capture output</text>

  <g transform="translate(100, 410)">
    <rect width="180" height="100" rx="6" fill="#ffffff" stroke="#e65100" stroke-width="1.5"/>
    <text x="90" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#bf360c">LLM Runners</text>
    <text x="90" y="44" text-anchor="middle" font-size="11" fill="#555">runners/openai_runner.py</text>
    <text x="90" y="58" text-anchor="middle" font-size="11" fill="#555">runners/anthropic_runner.py</text>
    <text x="90" y="72" text-anchor="middle" font-size="11" fill="#555">runners/gemini_runner.py</text>
    <text x="90" y="88" text-anchor="middle" font-size="11" fill="#888">prompt → JSON ops</text>
  </g>

  <g transform="translate(300, 410)">
    <rect width="180" height="100" rx="6" fill="#ffffff" stroke="#e65100" stroke-width="1.5"/>
    <text x="90" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#bf360c">Contracts</text>
    <text x="90" y="44" text-anchor="middle" font-size="11" fill="#555">contracts.py</text>
    <text x="90" y="64" text-anchor="middle" font-size="11" fill="#888">JSON normalization</text>
    <text x="90" y="78" text-anchor="middle" font-size="11" fill="#888">+ safety allowlist</text>
  </g>

  <g transform="translate(500, 410)">
    <rect width="180" height="100" rx="6" fill="#ffffff" stroke="#e65100" stroke-width="1.5"/>
    <text x="90" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#bf360c">Dispatcher</text>
    <text x="90" y="44" text-anchor="middle" font-size="11" fill="#555">dispatcher.py</text>
    <text x="90" y="64" text-anchor="middle" font-size="11" fill="#888">JSON → bpy.ops.*</text>
    <text x="90" y="78" text-anchor="middle" font-size="11" fill="#888">translation</text>
  </g>

  <g transform="translate(700, 410)">
    <rect width="180" height="100" rx="6" fill="#ffffff" stroke="#e65100" stroke-width="1.5"/>
    <text x="90" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#bf360c">Workers</text>
    <text x="90" y="44" text-anchor="middle" font-size="11" fill="#555">workers/pool.py</text>
    <text x="90" y="58" text-anchor="middle" font-size="11" fill="#555">workers/worker_loop.py</text>
    <text x="90" y="72" text-anchor="middle" font-size="11" fill="#555">workers/simple_runner.py</text>
    <text x="90" y="88" text-anchor="middle" font-size="11" fill="#888">Blender process pool</text>
  </g>

  <g transform="translate(900, 410)">
    <rect width="180" height="100" rx="6" fill="#ffffff" stroke="#e65100" stroke-width="1.5"/>
    <text x="90" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#bf360c">Capture</text>
    <text x="90" y="44" text-anchor="middle" font-size="11" fill="#555">scene_capture.py</text>
    <text x="90" y="58" text-anchor="middle" font-size="11" fill="#555">screenshot.py</text>
    <text x="90" y="78" text-anchor="middle" font-size="11" fill="#888">stats + PNG</text>
  </g>

  <!-- Arrow M2 → M3 -->
  <line x1="600" y1="530" x2="600" y2="580" stroke="#444" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ============ M3: EVALUATION ============ -->
  <rect x="80" y="590" width="1040" height="220" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="100" y="622" font-size="20" font-weight="700" fill="#1b5e20">M3. EVALUATION — Score the output</text>
  <text x="100" y="644" font-size="13" fill="#555">Two judges run in parallel: deterministic constraints + style-aware LLM judge</text>

  <!-- L2 sub-section -->
  <g transform="translate(100, 670)">
    <rect width="450" height="120" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="14" y="22" font-size="14" font-weight="600" fill="#1b5e20">L2 — Constraint Validator</text>
    <text x="14" y="40" font-size="11" fill="#555">evaluator.py</text>
    <text x="14" y="60" font-size="11" fill="#777">• Hard constraints — pass/fail (object count, bbox, materials)</text>
    <text x="14" y="76" font-size="11" fill="#777">• Topology policy — pass/fail (manifold, quad ratio, max faces)</text>
    <text x="14" y="92" font-size="11" fill="#777">• Soft constraints — weighted score, no pass/fail</text>
    <text x="14" y="110" font-size="11" font-weight="600" fill="#1b5e20">→ The deterministic, scalable main benchmark</text>
  </g>

  <!-- L3 sub-section -->
  <g transform="translate(570, 670)">
    <rect width="450" height="120" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="14" y="22" font-size="14" font-weight="600" fill="#1b5e20">L3 — LLM-as-Judge</text>
    <text x="14" y="40" font-size="11" fill="#555">judge.py</text>
    <text x="14" y="60" font-size="11" fill="#777">• Two-step prompt: detect style → score within style</text>
    <text x="14" y="76" font-size="11" fill="#777">• Variance check (3 runs, median, flag stddev &gt; 1.0)</text>
    <text x="14" y="92" font-size="11" fill="#777">• Calibration: calibration/calibrate.py — bias detection</text>
    <text x="14" y="110" font-size="11" font-weight="600" fill="#1b5e20">→ Soft signal only, never decides hard pass/fail</text>
  </g>

  <!-- Arrow M3 → M4 -->
  <line x1="600" y1="810" x2="600" y2="860" stroke="#444" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ============ M4: OUTPUTS & TOOLS ============ -->
  <rect x="80" y="870" width="1040" height="200" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="100" y="902" font-size="20" font-weight="700" fill="#4a148c">M4. OUTPUTS &amp; TOOLS — Persist + analyze</text>
  <text x="100" y="924" font-size="13" fill="#555">Turn raw run results into artifacts humans can read, search, and improve over time</text>

  <g transform="translate(100, 950)">
    <rect width="220" height="100" rx="6" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.5"/>
    <text x="110" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#4a148c">Reporter</text>
    <text x="110" y="44" text-anchor="middle" font-size="11" fill="#555">reporting.py</text>
    <text x="110" y="64" text-anchor="middle" font-size="11" fill="#888">report.md (human)</text>
    <text x="110" y="78" text-anchor="middle" font-size="11" fill="#888">report.json (machine)</text>
  </g>

  <g transform="translate(340, 950)">
    <rect width="220" height="100" rx="6" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.5"/>
    <text x="110" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#4a148c">CSV Database</text>
    <text x="110" y="44" text-anchor="middle" font-size="11" fill="#555">csv_db.py</text>
    <text x="110" y="64" text-anchor="middle" font-size="11" fill="#888">db/runs.csv</text>
    <text x="110" y="78" text-anchor="middle" font-size="11" fill="#888">db/attempts.csv</text>
  </g>

  <g transform="translate(580, 950)">
    <rect width="220" height="100" rx="6" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.5"/>
    <text x="110" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#4a148c">History CLI</text>
    <text x="110" y="44" text-anchor="middle" font-size="11" fill="#555">history.py</text>
    <text x="110" y="64" text-anchor="middle" font-size="11" fill="#888">trends + comparisons</text>
    <text x="110" y="78" text-anchor="middle" font-size="11" fill="#888">across runs</text>
  </g>

  <g transform="translate(820, 950)">
    <rect width="220" height="100" rx="6" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.5"/>
    <text x="110" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#4a148c">Review CLI</text>
    <text x="110" y="44" text-anchor="middle" font-size="11" fill="#555">review.py</text>
    <text x="110" y="64" text-anchor="middle" font-size="11" fill="#888">human override flow</text>
    <text x="110" y="78" text-anchor="middle" font-size="11" fill="#888">judge_vs_human.csv</text>
  </g>

  <!-- ============ CROSS-CUTTING ============ -->
  <rect x="80" y="1100" width="1040" height="120" rx="12" fill="#fafafa" stroke="#9e9e9e" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="100" y="1130" font-size="18" font-weight="700" fill="#424242">Cross-cutting (used by all layers)</text>

  <g transform="translate(100, 1150)">
    <rect width="490" height="60" rx="6" fill="#ffffff" stroke="#9e9e9e" stroke-width="1.5"/>
    <text x="14" y="22" font-size="13" font-weight="600" fill="#424242">Schema (data contract)</text>
    <text x="14" y="40" font-size="11" fill="#555">schema.py — TestCaseCard, ConstraintResult, JudgeResult</text>
    <text x="14" y="54" font-size="11" fill="#888">Defines the JSON shape that every layer reads &amp; writes</text>
  </g>

  <g transform="translate(610, 1150)">
    <rect width="490" height="60" rx="6" fill="#ffffff" stroke="#9e9e9e" stroke-width="1.5"/>
    <text x="14" y="22" font-size="13" font-weight="600" fill="#424242">CLI Orchestrator</text>
    <text x="14" y="40" font-size="11" fill="#555">cli.py — main entry; subcommands history / review / calibrate</text>
    <text x="14" y="54" font-size="11" fill="#888">Wires M1 → M2 → M3 → M4 together for one benchmark run</text>
  </g>
</svg>
